# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: com.wipro.earmms.itadmin.app.earmmsitadminapp
type: application
framework:
  name: SAPUI5
  version: 1.147.2
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.tnt
    - name: sap.f
    - name: sap.ui.layout
    - name: sap.ui.unified
    - name: sap.ushell
    - name: themelib_sap_horizon
server:
  customMiddleware:
    - name: fiori-tools-preview
      afterMiddleware: compression
      configuration:
        flp:
          theme: sap_horizon
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertErrors: false # If set to true, certificate errors will be ignored. E.g. self-signed certificates will be accepted
        ui5:
          path:
            - /resources
            - /test-resources
          url: https://ui5.sap.com
          version: "1.147.2"
        backend:
          - path: /odata/v4/earmms
            url: https://99a4398ctrial-dev-earmms-srv.cfapps.us10-001.hana.ondemand.com
